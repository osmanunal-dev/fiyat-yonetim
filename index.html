<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiyat Yönetimi — Knauf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#14161b; --ink-2:#1d2129; --ink-3:#2a2f3a;
  --paper:#f6f4ef; --card:#ffffff; --line:#e6e2d8; --line-2:#d8d3c6;
  --muted:#6b6557; --muted-2:#8d8676;
  --accent:#b8501e; --accent-soft:#f2e3d8; --accent-ink:#8a3a13;
  --good:#1f6b4a; --good-soft:#e3f0e8;
  --eur:#3457a6; --usd:#1f7a57; --eur-soft:#e6ecf6; --usd-soft:#e1f1ea;
  --shadow:0 1px 2px rgba(20,22,27,.04),0 4px 16px rgba(20,22,27,.05);
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.app{display:grid;grid-template-columns:252px 1fr;height:100vh;overflow:hidden}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25;display:none}

.side{background:var(--ink);color:#d6d2c8;display:flex;flex-direction:column;overflow:hidden}
.brand{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand h1{font-family:var(--disp);font-size:16px;font-weight:600;color:#fff;letter-spacing:-.01em}
.brand .sub{font-size:11px;color:#8c8678;margin-top:3px}
.navwrap{flex:1;overflow-y:auto;padding:10px 0 16px}
.navwrap::-webkit-scrollbar{width:8px}
.navwrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
.nav-special{display:flex;align-items:center;gap:10px;width:100%;text-align:left;margin:0 10px 6px;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:#cfcabe;width:calc(100% - 20px);background:rgba(255,255,255,.05);transition:.12s}
.nav-special:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-special.active{background:var(--accent);color:#fff}
.nav-special svg{flex-shrink:0}
/* Fiyat Listeleri grubu (markaların üst başlığı) */
.nav-group{display:flex;align-items:center;gap:9px;width:calc(100% - 20px);text-align:left;margin:2px 10px 4px;padding:9px 12px;border-radius:9px;font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#cfcabe;background:rgba(255,255,255,.04);transition:.12s}
.nav-group:hover{background:rgba(255,255,255,.09);color:#fff}
.nav-group svg{flex-shrink:0;color:var(--accent)}
.nav-group .ng-name{flex:1}
.nav-group .ng-ct{font-family:var(--mono);font-size:10px;color:#8a8475;letter-spacing:0}
.nav-group .chev{color:#8a8475;transition:transform .18s}
.nav-group.open .chev{transform:rotate(90deg)}
.nav-group-body.closed{display:none}
.nav-group-body{border-left:1px solid rgba(255,255,255,.06);margin-left:18px}
.nav-group-body .mk-head{padding-left:14px}
.nav-group-body .mk-body{margin-left:0}
.mk-h{display:flex;align-items:center;gap:8px;padding:12px 18px 5px;font-family:var(--disp);font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#7d7869}
.mk-h .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.mk-head{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:12px 18px 6px;font-family:var(--disp);font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#7d7869;transition:color .12s}
.mk-head:hover{color:#b6b0a0}
.mk-head .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.mk-head .mk-ct{font-family:var(--mono);font-size:10px;color:#6b6657;letter-spacing:0}
.mk-head .chev{margin-left:auto;color:#6b6657;transition:transform .18s}
.mk-head.open .chev{transform:rotate(90deg)}
.mk-body.closed{display:none}
.nav-item.src{color:#a59f90;font-size:12px;padding-top:7px;padding-bottom:7px}
.nav-item.src .srcrow{display:flex;align-items:center;gap:7px}
.nav-item.src.active{color:#fff}
.nav-item.src svg{opacity:.8}
.brandgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.brandcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:13px}
.brandcard .bc-head{display:flex;align-items:center;gap:9px}
.brandcard .bc-head .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brandcard .bc-head h3{font-family:var(--disp);font-size:17px;font-weight:600;letter-spacing:-.01em}
.brandcard .bc-stats{display:flex;gap:10px}
.brandcard .bc-stats>div{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.brandcard .bc-stats .k{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-family:var(--disp)}
.brandcard .bc-stats .v{font-family:var(--mono);font-size:15px;font-weight:600}
.brandcard .bc-file{font-family:var(--mono);font-size:11.5px;color:var(--muted-2);word-break:break-all;line-height:1.4}
.drop.sm{padding:16px;display:flex;align-items:center;gap:10px;text-align:left;flex-wrap:wrap}
.drop.sm svg{color:var(--accent);flex-shrink:0}
.drop.sm span{font-size:12.5px;color:var(--muted)}
.drop.sm b{color:var(--ink);font-weight:600}
.drop.sm .formats{width:100%;font-family:var(--mono);font-size:10.5px;color:var(--muted-2);padding-left:28px}
.bc-open{align-self:flex-start;font-size:12.5px;font-weight:600;color:var(--accent);padding:6px 0;transition:gap .12s}
.bc-open:hover{text-decoration:underline}
.paytypes{display:flex;gap:3px;background:var(--paper);border:1px solid var(--line-2);border-radius:8px;padding:3px}
.paytypes button{font-size:11.5px;font-weight:500;padding:6px 10px;border-radius:6px;color:var(--muted);white-space:nowrap;transition:.12s}
.paytypes button:hover{color:var(--ink)}
.paytypes button.on{background:var(--accent);color:#fff}
.nav-item{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;padding:8px 18px 8px 32px;font-size:13px;color:#c7c2b6;border-left:2px solid transparent;transition:.12s}
.nav-item:hover{background:rgba(255,255,255,.045);color:#fff}
.nav-item.active{background:rgba(184,80,30,.16);border-left-color:var(--accent);color:#fff;font-weight:500}
.nav-item .ct{font-family:var(--mono);font-size:10.5px;color:#7d7869}
.nav-item.active .ct{color:#e0b79f}
.nav-empty{padding:8px 18px 8px 32px;font-size:12px;color:#6b6657;font-style:italic}
.side-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;gap:8px}
.side-foot button{flex:1;font-size:11.5px;padding:7px;border-radius:7px;background:rgba(255,255,255,.06);color:#cfcabe;font-weight:500;transition:.12s}
.side-foot button:hover{background:rgba(255,255,255,.12);color:#fff}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 22px;background:var(--card);border-bottom:1px solid var(--line);z-index:5}
.search{flex:1;max-width:380px;position:relative}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line-2);border-radius:9px;font-size:13px;background:var(--paper);transition:.12s}
.search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
.kur-bar{display:flex;gap:8px;margin-left:auto;align-items:center}
.kur-upd{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;background:var(--accent);color:#fff;transition:.12s;white-space:nowrap}
.kur-upd:hover{background:var(--accent-ink)}
.kur-upd:disabled{opacity:.6;cursor:default}
.kur-upd svg{transition:transform .6s}
.kur-upd.loading svg{animation:kurspin .8s linear infinite}
@keyframes kurspin{to{transform:rotate(360deg)}}
@media(max-width:700px){.kur-upd span{display:none}.kur-upd{padding:8px}}
.kur{display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line-2);border-radius:9px;padding:5px 9px}
.kur label{font-family:var(--disp);font-size:11px;font-weight:600;color:var(--muted)}
.kur input{width:74px;border:none;background:none;font-family:var(--mono);font-size:13px;font-weight:500;text-align:right;color:var(--ink)}
.kur input:focus{outline:none;color:var(--accent)}
.kur.eur label{color:var(--eur)} .kur.usd label{color:var(--usd)}

.scrollarea{flex:1;overflow-y:auto;padding:20px 22px 60px}
.scrollarea::-webkit-scrollbar{width:11px}
.scrollarea::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:11px;border:3px solid var(--paper)}

.sheet-head{margin-bottom:14px}
.crumb{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:3px}
.crumb b{color:var(--accent-ink);font-weight:600}
.sheet-head h2{font-family:var(--disp);font-size:23px;font-weight:600;letter-spacing:-.02em}
.sheet-head .desc{font-size:12.5px;color:var(--muted);margin-top:2px}

/* upload */
.drop{background:var(--card);border:2px dashed var(--line-2);border-radius:14px;padding:34px 24px;text-align:center;transition:.15s;cursor:pointer;margin-bottom:18px}
.drop:hover,.drop.drag{border-color:var(--accent);background:#fffdfb}
.drop .ic{width:46px;height:46px;border-radius:12px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.drop h3{font-family:var(--disp);font-size:16px;font-weight:600;margin-bottom:4px}
.drop p{font-size:12.5px;color:var(--muted)}
.drop .formats{margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted-2)}
.src-info{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 16px;box-shadow:var(--shadow);min-width:120px}
.stat .lbl{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-family:var(--disp)}
.stat .val{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:2px}
.stat .val.sm{font-size:13px;font-weight:500}

.params{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.params .pgroup{display:flex;gap:11px;flex-wrap:wrap}
.pf{display:flex;flex-direction:column;gap:4px}
.pf label{font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;font-family:var(--disp)}
.pf .in{display:flex;align-items:center;background:var(--paper);border:1px solid var(--line-2);border-radius:8px;padding:0 8px;transition:.12s}
.pf .in:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
.pf .in.kar:focus-within{border-color:var(--good);box-shadow:0 0 0 3px var(--good-soft)}
.pf input{width:46px;border:none;background:none;font-family:var(--mono);font-size:14px;font-weight:600;text-align:right;padding:7px 0;color:var(--ink)}
.pf input:focus{outline:none}
.pf .in .pct{font-size:12px;color:var(--muted-2);padding-left:2px}
.pf.kar input{color:var(--good)}
.chain{margin-left:auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap;align-self:center}
.chain .fx{font-family:var(--mono);font-size:11.5px;color:var(--muted);background:var(--paper);border:1px solid var(--line);padding:4px 9px;border-radius:7px}
.chain .fx b{color:var(--accent-ink);font-weight:600}
.chain .arr{color:var(--line-2);font-size:14px}

.tablecard{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:#fbfaf7;font-family:var(--disp);font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:left;padding:11px 14px;border-bottom:1.5px solid var(--line-2);white-space:nowrap;z-index:2}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid #f0ede5}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fcfbf8}
td{padding:9px 14px;vertical-align:middle}
.kod{font-family:var(--mono);font-size:12px;color:var(--muted)}
.ad{font-size:13px;font-weight:450;max-width:360px;line-height:1.3}
.birim{font-size:11.5px;color:var(--muted-2);white-space:nowrap}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px}
.badge.eur{background:var(--eur-soft);color:var(--eur)}
.badge.usd{background:var(--usd-soft);color:var(--usd)}
.badge.tl{background:#eee9df;color:var(--muted)}
td.num{text-align:right;font-family:var(--mono);font-size:13px}
.liste-v{color:var(--ink);font-weight:500}
.net{font-weight:600;color:var(--good)}
.section-row td{background:var(--ink-2);color:#e8e3d6;font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:7px 14px}
.tbl-foot{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:#fbfaf7;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.tbl-foot .acts{display:flex;gap:8px}
.tbl-foot button{font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;border:1px solid var(--line-2);background:#fff;color:var(--ink);transition:.12s}
.tbl-foot button:hover{border-color:var(--accent);color:var(--accent)}
.noresult{padding:40px;text-align:center;color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state h3{font-family:var(--disp);font-size:18px;color:var(--ink);margin-bottom:6px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:.25s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.25);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#8a2b1a}
.menu-btn{display:none}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:252px;z-index:30;transform:translateX(-100%);transition:transform .2s}
  .side.open{transform:translateX(0)}
  .menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line-2);background:#fff}
  .scrim.show{display:block}
  .chain{display:none}
  .ad{max-width:190px}
  .scrollarea{padding:14px}
}
/* Düzenle (kalem) butonları + yeniden adlandırma modalı */
.mk-head .mk-name{flex:0 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mk-edit,.ni-edit{display:inline-flex;align-items:center;justify-content:center;color:inherit;opacity:.32;flex-shrink:0;padding:2px;border-radius:5px;cursor:pointer;transition:.12s}
.mk-edit{margin-right:2px}
.mk-head:hover .mk-edit,.nav-item:hover .ni-edit{opacity:.7}
.mk-edit:hover,.ni-edit:hover{opacity:1;color:#fff;background:rgba(255,255,255,.12)}
.nav-item .ni-name{flex:0 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .ni-edit{margin-left:4px}
.nav-item .ct{margin-left:auto;padding-left:6px}
/* Ana Sayfa kart düzenleme */
.brandcard .bc-head{display:flex;align-items:center;gap:8px}
.bc-edit{display:inline-flex;align-items:center;color:var(--muted-2);opacity:.55;cursor:pointer;padding:2px;border-radius:5px;transition:.12s;flex-shrink:0}
.bc-edit:hover{opacity:1;color:var(--accent);background:var(--accent-soft)}
.bc-head .bc-edit{margin-left:auto}
.bc-file{display:flex;align-items:center;gap:6px;justify-content:space-between}
.bc-st-ed{cursor:pointer;transition:.12s}
.bc-st-ed:hover{border-color:var(--accent);background:var(--accent-soft)}
.bc-st-ed .k{display:inline-flex;align-items:center;gap:4px}
.bc-st-ed .k svg{width:11px;height:11px;opacity:.6}
/* Ana Sayfa satır düzeni */
.brandrows{display:flex;flex-direction:column;gap:8px}
.brandrow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;transition:.12s}
.brandrow.drag{border-color:var(--accent);background:var(--accent-soft)}
.br-main{display:flex;flex-direction:column;gap:5px;min-width:0;flex:1 1 380px}
.br-name{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;color:var(--ink)}
.br-name .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.br-meta{display:flex;align-items:center;gap:6px 14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.br-m{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.br-m b{color:var(--ink-2);font-weight:600}
.br-note{color:var(--muted-2);font-family:var(--mono);font-size:11px;white-space:normal;min-width:0}
.br-ed{cursor:pointer;border-radius:5px;padding:1px 4px;transition:.12s}
.br-ed svg{width:11px;height:11px;opacity:.45;flex-shrink:0}
.br-ed:hover{background:var(--accent-soft);color:var(--accent-ink)}
.br-ed:hover svg{opacity:1;color:var(--accent)}
.br-acts{display:flex;align-items:center;gap:7px;flex-shrink:0}
.br-btn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;border:1px solid var(--line-2);background:var(--paper);color:var(--ink-2);transition:.12s;white-space:nowrap}
.br-btn:hover{border-color:var(--accent);color:var(--accent-ink)}
.br-open{background:var(--accent);color:#fff;border-color:var(--accent)}
.br-open:hover{background:var(--accent-ink);color:#fff}
@media(max-width:560px){.br-acts{width:100%}.br-btn{flex:1}}
.rn-ov{position:fixed;inset:0;background:rgba(20,22,27,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:120;padding:20px;animation:rnf .12s ease}
@keyframes rnf{from{opacity:0}to{opacity:1}}
.rn-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.25);padding:20px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}
.rn-h{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.rn-in{width:100%;font-size:15px;padding:11px 13px;border:1.5px solid var(--line-2);border-radius:9px;color:var(--ink);background:var(--paper);outline:none;transition:.12s}
.rn-in:focus{border-color:var(--accent);background:#fff}
.rn-note{font-size:11.5px;color:var(--muted-2)}
.rn-note b{color:var(--muted);font-weight:600}
.rn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.rn-row button{font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;transition:.12s}
.rn-c{background:var(--paper);border:1px solid var(--line-2);color:var(--muted)}
.rn-c:hover{color:var(--ink)}
.rn-s{background:var(--accent);color:#fff}
.rn-s:hover{background:var(--accent-ink)}
/* Yeni marka ekleme formu + buton */
.sh-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.nm-add{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;transition:.12s;white-space:nowrap}
.nm-add:hover{background:var(--accent-ink)}
.br-del{color:var(--danger,#b3261e)!important;border-color:var(--danger,#b3261e)!important}
.br-del:hover{background:rgba(179,38,30,.08)}
.nm-card{max-width:430px;gap:9px}
.nm-l{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.nm-opt{font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted-2)}
.nm-seg{display:flex;gap:6px}
.nm-seg button{flex:1;padding:9px 0;border:1.5px solid var(--line-2);border-radius:8px;font-size:14px;font-weight:600;color:var(--muted);background:var(--paper);transition:.12s}
.nm-seg button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.nm-chk{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);cursor:pointer;margin-top:2px}
.nm-chk input{width:16px;height:16px;accent-color:var(--accent)}
.nm-file{font-size:13px;color:var(--muted);width:100%}
.nm-file::file-selector-button{font-size:12px;font-weight:600;padding:7px 12px;margin-right:10px;border:1px solid var(--line-2);border-radius:7px;background:var(--paper);color:var(--ink);cursor:pointer}
.nm-tmpl{align-self:flex-start;font-size:13px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--accent-soft);padding:8px 13px;border-radius:8px;transition:.12s}
.nm-tmpl:hover{background:var(--accent);color:#fff}
/* Hesaplama / Metraj */
.hs-code{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted-2);background:var(--paper);border:1px solid var(--line-2);padding:2px 8px;border-radius:6px;vertical-align:middle;margin-left:6px}
.hs-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hs-tab{font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:1.5px solid var(--line-2);background:var(--paper);color:var(--muted);transition:.12s}
.hs-tab:hover{border-color:var(--accent);color:var(--accent-ink)}
.hs-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.hs-ctrl{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end;margin:18px 0 14px}
.hs-m2{display:flex;flex-direction:column;gap:5px}
.hs-m2 label,.hs-col label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.hs-m2 input{font-size:20px;font-weight:700;font-family:var(--mono);width:130px;padding:8px 12px;border:1.5px solid var(--line-2);border-radius:9px;color:var(--ink);background:var(--card);outline:none;transition:.12s}
.hs-m2 input:focus{border-color:var(--accent);background:#fff}
.hs-m2{position:relative}.hs-m2 span{position:absolute;right:12px;bottom:11px;font-size:12px;color:var(--muted-2);pointer-events:none}
.hs-table{width:100%;border-collapse:collapse;font-size:13px}
.hs-table th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-2);padding:8px 10px;border-bottom:1.5px solid var(--line);vertical-align:bottom}
.hs-table th.num,.hs-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.hs-table td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
.hs-grp td{font-family:var(--disp);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);padding-top:9px;padding-bottom:9px}
.hs-mz b{font-weight:600}
.hs-mz .hs-oz{display:block;font-size:11px;color:var(--muted-2);margin-top:1px}
.hs-alt{margin-right:7px;vertical-align:middle;width:14px;height:14px;accent-color:var(--accent)}
.hs-altrow.off{opacity:.5}
.hs-src{max-width:320px}
.hs-pick{font-size:12px;color:var(--ink);background:var(--paper);border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;transition:.12s}
.hs-pick:hover{border-color:var(--accent);background:var(--accent-soft)}
.hs-pick-empty{color:var(--accent-ink);font-weight:600}
.hs-clr{margin-left:5px;color:var(--muted-2);font-size:13px;padding:2px 5px;border-radius:5px}
.hs-clr:hover{color:#c0392b;background:#fbeae8}
.hs-tut{font-weight:600}
.hs-pkt{width:64px;text-align:right;font-family:var(--mono);font-size:12px;padding:4px 7px;border:1px solid var(--line-2);border-radius:6px;background:var(--card);color:var(--ink);outline:none}
.hs-pkt:focus{border-color:var(--accent);background:#fff}
.hs-total td{font-weight:700;border-top:2px solid var(--line);border-bottom:none;padding-top:12px;font-size:14px;color:var(--ink)}
.hs-total td.num{color:var(--accent-ink);font-size:16px}
.hs-total.sub td{font-weight:600;font-size:12px;color:var(--muted);padding-top:4px;border-top:none}
.hs-total.sub td.num{font-size:13px;color:var(--muted)}
.hs-notes{margin-top:20px;font-size:12px;color:var(--muted)}
.hs-notes b{display:block;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
.hs-notes ul{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:3px}
/* Knauf ürün seçici */
.hp-card{max-width:520px;gap:10px}
.hp-list{max-height:48vh;overflow:auto;display:flex;flex-direction:column;gap:4px;margin:2px -4px;padding:0 4px}
.hp-item{display:flex;flex-direction:column;gap:2px;text-align:left;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper);transition:.1s}
.hp-item:hover{border-color:var(--accent);background:var(--accent-soft)}
.hp-ad{font-size:13px;color:var(--ink);font-weight:500}
.hp-meta{font-size:11px;color:var(--muted-2);font-family:var(--mono)}
.hp-empty{padding:18px;text-align:center;color:var(--muted-2);font-size:13px}
</style>
</head>

const LS_KEY = 'knaufFiyat_v4';
let store = load();
let active = {type:'anasayfa', marka:SEED.markaSira[0], cat:null};
let query='';

function load(){
  try{ const s=JSON.parse(localStorage.getItem(LS_KEY));
    if(s&&s.markalar){
      // Seed'de yeni eklenen ya da gömülü (embedded) markaları tazele; kullanıcı yüklemelerini koru
      SEED.markaSira.forEach(m=>{
        if(!s.markalar[m]||(SEED.markalar[m].embedded&&!(s.uploaded&&s.uploaded[m]))){ s.markalar[m]=JSON.parse(JSON.stringify(SEED.markalar[m])); if(!s.markaSira.includes(m)) s.markaSira.push(m); }
        else { // mevcut markanın yapılandırmasını seed'den güncelle (yüklenen liste verisi korunur)
          ['paramlar','kolonlar','secici','varsayilanIsk','format','tip'].forEach(k=>{
            if(SEED.markalar[m][k]!==undefined) s.markalar[m][k]=JSON.parse(JSON.stringify(SEED.markalar[m][k])); else delete s.markalar[m][k];
          });
        }
      });
      return s;
    }
  }catch(e){}
  // Önceki sürümlerden yalnızca ayarları (iskonto, kur, açık/kapalı) taşı; liste verisi taze seed'den gelir
  let migIsk={}, migKur=null, migAcik=null;
  try{
    const v3=JSON.parse(localStorage.getItem('knaufFiyat_v3'));
    if(v3){ migKur=v3.kurlar; migAcik=v3.acik; if(v3.isk) migIsk={...v3.isk}; }
  }catch(e){}
  if(!Object.keys(migIsk).length){
    try{ const v2=JSON.parse(localStorage.getItem('knaufFiyat_v2'));
      if(v2){ migKur=migKur||v2.kurlar; migAcik=migAcik||v2.acik; if(v2.isk) Object.keys(v2.isk).forEach(k=>migIsk['Knauf|'+k]=v2.isk[k]); }
    }catch(e){}
  }
  const fresh=JSON.parse(JSON.stringify(SEED));
  return { markalar:fresh.markalar, markaSira:fresh.markaSira,
           kurlar:migKur||{EUR:53.7848,USD:46.3652}, isk:migIsk, acik:migAcik||{} };
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){ toast('Kaydedilemedi (depolama dolu olabilir)',true); } }

function brand(m){ return store.markalar[m]; }
function defIsk(m){ return {...(brand(m).varsayilanIsk||{isk1:0,isk2:0,isk3:0,kar:0})}; }
function iskKey(m,cat){ return m+'|'+cat; }
function getIsk(m,cat){ return {...defIsk(m), ...(store.isk[iskKey(m,cat)]||{})}; }
function findCat(m,cat){ return (brand(m).kategoriler||[]).find(x=>x.ad===cat); }
function getOdeme(m){ const b=brand(m); if(!b.secici) return null; store.secim=store.secim||{}; return store.secim[m]||b.secici.tipler[0].key; }
function urunFiyat(u,colKey,m){ const b=brand(m); if(b.secici){ const blk=u.f[getOdeme(m)]; return blk?blk[colKey]:null; } return u.f[colKey]; }
function payselector(m){
  const b=brand(m); if(!b.secici) return '';
  const cur=getOdeme(m);
  return `<div class="pf"><label>${b.secici.label}</label><div class="paytypes" data-marka="${m}">`+
    b.secici.tipler.map(o=>`<button data-pt="${o.key}" class="${o.key===cur?'on':''}">${o.label}</button>`).join('')+`</div></div>`;
}

function net(liste,isk,doviz){
  if(liste==null||liste==='') return null;
  let r=Number(liste); if(isNaN(r)) return null;
  ['isk1','isk2','isk3'].forEach(k=>{ if(isk[k]) r*=(1-isk[k]/100); });
  if(isk.kar) r*=(1+isk.kar/100);
  if(doviz==='EUR') r*=store.kurlar.EUR; else if(doviz==='USD') r*=store.kurlar.USD;
  return r;
}
const fmt=n=> n==null||isNaN(n)?'—':n.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
function titleCase(s){ return String(s).toLocaleLowerCase('tr').replace(/(^|[\s\-/(])([\p{L}])/gu,(x,p,c)=>p+c.toLocaleUpperCase('tr')).replace(/\((hr|cr)\)/gi,m=>m.toUpperCase()); }

/* Görünen ad override'ları (anahtarlar sabit kalır) */
function mAd(m){ return (store.markaAd&&store.markaAd[m])||m; }
function kAd(m,cat){ return (store.katAd&&store.katAd[m+'|'+cat])||titleCase(cat); }
function setMarkaAd(m,v){ store.markaAd=store.markaAd||{}; v=(v||'').trim(); if(!v||v===m) delete store.markaAd[m]; else store.markaAd[m]=v; save(); renderNav(); render(); toast('Marka adı güncellendi'); }
function setKatAd(m,cat,v){ store.katAd=store.katAd||{}; const k=m+'|'+cat; v=(v||'').trim(); if(!v||v===titleCase(cat)) delete store.katAd[k]; else store.katAd[k]=v; save(); renderNav(); render(); toast('Sekme adı güncellendi'); }
function gncOrij(m){ const b=brand(m); return b.guncelleme||'—'; }
function gncAd(m){ return (store.markaGnc&&store.markaGnc[m])||gncOrij(m); }
function setMarkaGnc(m,v){ store.markaGnc=store.markaGnc||{}; v=(v||'').trim(); if(!v||v===gncOrij(m)) delete store.markaGnc[m]; else store.markaGnc[m]=v; save(); render(); toast('Geçerlilik güncellendi'); }
function notOrij(m){ const b=brand(m); return b.dosyaAdi||b.kaynak||'Gömülü liste'; }
function notAd(m){ return (store.markaNot&&store.markaNot[m])||notOrij(m); }
function setMarkaNot(m,v){ store.markaNot=store.markaNot||{}; v=(v||'').trim(); if(!v||v===notOrij(m)) delete store.markaNot[m]; else store.markaNot[m]=v; save(); render(); toast('Açıklama güncellendi'); }
function openRename(baslik, mevcut, orijinal, onSave){
  const ov=document.createElement('div'); ov.className='rn-ov';
  ov.innerHTML=`<div class="rn-card">
    <div class="rn-h">${baslik}</div>
    <input class="rn-in" type="text" value="${(mevcut||'').replace(/"/g,'&quot;')}" maxlength="60">
    <div class="rn-note">Boş bırakılırsa orijinale döner: <b>${orijinal}</b></div>

async function handleFile(file,targetM){

  try{
    const buf=await file.arrayBuffer();
    let cats;
    if(/\.csv$/i.test(file.name)){
      const text=new TextDecoder('utf-8').decode(new Uint8Array(buf)).replace(/^\uFEFF/,'');
      cats=parseUniversalCSV(text,brand(m)) || parseKnaufWB(XLSX.read(text,{type:'string',raw:true}));
    } else if(fmt0==='yucel'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseYucel(wb);
    } else if(fmt0==='dalsan'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseDalsan(wb);
    } else if(fmt0==='filli'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseFilli(wb);
    } else if(fmt0==='fawori'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseFawori(wb);
    } else if(fmt0==='baumit'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseBaumit(wb);
    } else if(fmt0==='universal'){
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      cats=parseUniversalWB(wb,brand(m));
    } else if(/\.ods$/i.test(file.name)){ cats=parseKnauf(await odsToRows(buf)); }
    else { cats=parseKnaufWB(XLSX.read(new Uint8Array(buf),{type:'array'})); }
    if(!cats.length){ toast('Liste içinde ürün bulunamadı. Beklenen format bu marka için uygun değil.',true); return; }
    const b=brand(m);
    b.guncelleme=guessDate(file.name)||b.guncelleme||'—'; b.dosyaAdi=file.name; b.kaynak='Yüklenen liste'; b.kategoriler=cats;

/* Dalsan formatı: A=kod B=ürün C=birim D=vade E-J=6 fabrika fiyatı (0=yok) */
const DALSAN_CAT={'110':'Alçı, Sıva & Saten','111':'Alçı, Sıva & Saten','120':'Şap & Zemin','125':'Şap & Zemin','130':'GRİO Tamir Harçları','138':'Astarlar','140':'Alçıpan Levhalar','141':'Alçıpan Levhalar','148':'Alçıpan Levhalar','160':'Çimentolu Levhalar','161':'Çimentolu Levhalar','170':'Profiller','172':'Profiller','174':'Profiller','179':'Profiller','180':'BoardeX Profilleri','181':'BoardeX Profilleri','210':'Agraf & Askı','211':'Agraf & Askı','220':'Vidalar','221':'Vidalar','230':'Dübeller','240':'Bantlar','281':'Diğer Ürünler','285':'Revizyon Kapakları','290':'Akustik Ürünler','300':'BoardeX Aksesuarları','301':'BoardeX Aksesuarları','302':'BoardeX Aksesuarları','303':'BoardeX Aksesuarları','311':'Profil Aksesuarları','350':'Fibero','800':'Derz Dolguları'};
const DALSAN_FAC=[['golbasi',4],['bala',5],['gebze',6],['turgutlu',7],['elmadag',8],['cerkezkoy',9]]; // 0-tabanlı kolon indexleri
function parseDalsan(wb){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
  const fpos=v=>{ const n=numParse(v); return (n!=null&&n>0)?n:null; };
  const cats={}; const order=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]||[]; const kod=r[0];
    if(kod==null||kod===''||/ürün\s*kodu/i.test(String(kod))) continue;
    const pre=String(kod).split('.')[0]; const cat=DALSAN_CAT[pre]||'Diğer Ürünler';
    const f={}; DALSAN_FAC.forEach(([key,ci])=>f[key]={fiyat:fpos(r[ci])});
    if(!cats[cat]){ cats[cat]=[]; order.push(cat); }
    cats[cat].push({kod:String(kod),ad:r[1]!=null?String(r[1]):'',birim:r[2]!=null?String(r[2]):'',doviz:null,f});
  }
  return order.map(c=>({ad:c,urunler:cats[c]}));
}
/* Filli Boya: çok sayfa, Ürün Adı/Renk/Ambalaj + Liste + Vadeli/Peşin maliyet (KALDIRILAN sayfaları atlanır) */
function fpos(v){ const n=numParse(v); return (n!=null&&n>0)?n:null; }
function filliNorm(s){ return s==null?'':String(s).normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[ıİ]/g,'i').replace(/[şŞ]/g,'s').replace(/[ğĞ]/g,'g').replace(/[çÇ]/g,'c').replace(/[öÖ]/g,'o').replace(/[üÜ]/g,'u').trim().toLowerCase().replace(/\s+/g,' '); }
function parseFilli(wb){
  const cats=[];
  for(const sn of wb.SheetNames){
    if(/kaldiril/.test(filliNorm(sn))) continue;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:true,defval:null});
    let hr=-1;
    for(let i=0;i<Math.min(rows.length,9);i++){ if(filliNorm((rows[i]||[])[0])==='urun adi'){ hr=i; break; } }
    if(hr<0) continue;
    const hdr=rows[hr]; let lc=-1,vc=-1,pc=-1;
    hdr.forEach((v,ci)=>{ const h=filliNorm(v);
      if(lc<0&&h.indexOf('liste fiyat')===0) lc=ci;
      if(vc<0&&h.indexOf('vadeli')===0&&(h.indexOf('maliyet')>=0||h==='vadeli')) vc=ci;
      if(pc<0&&h.indexOf('pesin')>=0&&(h.indexOf('maliyet')>=0||h==='pesin')) pc=ci;
    });
    let curU=null,curR=null; const urunler=[];
    for(let i=hr+1;i<rows.length;i++){
      const r=rows[i]||[]; const A=r[0],B=r[1],C=r[2];
      const D=lc>=0?fpos(r[lc]):null; const va=vc>=0?fpos(r[vc]):null; const pe=pc>=0?fpos(r[pc]):null;
      if(A!=null&&A!==''){ curU=String(A).trim(); curR=(B!=null&&B!=='')?String(B).trim():null; }
      else if(B!=null&&B!==''){ curR=String(B).trim(); }
      if(D==null&&va==null&&pe==null) continue;
      if((C==null||C==='')&&D==null) continue;
      let ad=curU||''; if(curR) ad+=' '+curR;
      urunler.push({kod:'',ad,birim:(C!=null&&C!=='')?String(C).trim():'',doviz:null,f:{liste:D,maliyet:va!=null?va:pe}});
    }
    if(urunler.length) cats.push({ad:sn.trim(),urunler});
  }
  return cats;
}
/* Fawori Boya: tek aktif sayfa, A=tam ürün adı, Liste + Vadeli/Peşin net maliyet (KALDIRILAN atlanır) */
const FAWORI_SIZE=/\s+(\d+[.,]?\d*\s*(?:LT|L|KG|ML|GR|G|ADET|AD)\.?)$/i;
function parseFawori(wb){
  const cats=[];
  for(const sn of wb.SheetNames){
    if(/kaldiril/.test(filliNorm(sn))) continue;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:true,defval:null});
    let hr=-1;
    for(let i=0;i<Math.min(rows.length,16);i++){ if(filliNorm((rows[i]||[])[0])==='urun adi'){ hr=i; break; } }
    if(hr<0) continue;
    const hdr=rows[hr]; let lc=-1,vc=-1,pc=-1;
    hdr.forEach((v,ci)=>{ const h=filliNorm(v);
      if(lc<0&&h.indexOf('liste fiyat')>=0) lc=ci;
      if(vc<0&&h.indexOf('vadeli')===0&&h.indexOf('maliyet')>=0) vc=ci;
      if(pc<0&&h.indexOf('pesin')===0&&h.indexOf('maliyet')>=0) pc=ci;
    });
    const urunler=[];
    for(let i=hr+1;i<rows.length;i++){
      const r=rows[i]||[]; const A=r[0];
      if(A==null||String(A).trim()==='') continue;
      let nm=String(A).trim();
      const D=lc>=0?fpos(r[lc]):null; const va=vc>=0?fpos(r[vc]):null; const pe=pc>=0?fpos(r[pc]):null;
      if(D==null&&va==null&&pe==null) continue;
      let birim=''; const m=nm.match(FAWORI_SIZE); if(m){ birim=m[1].trim(); nm=nm.slice(0,m.index).trim(); }
      urunler.push({kod:'',ad:nm,birim,doviz:null,f:{liste:D,maliyet:va!=null?va:pe}});
    }
    if(urunler.length) cats.push({ad:'Boya & Astar',urunler});
  }
  return cats;
}
/* Baumit: A=kod C=ürün H=birim I-L=Fabrika/Edirne/İstanbul/Düzce (karışık döviz, KDV hariç) */
const BAUMIT_LOC=[['fabrika',8],['edirne',9],['istanbul',10],['duzce',11]]; // 0-tabanlı
function parseBaumitCell(v){
  if(v==null) return {fiyat:null,doviz:null};
  const s=String(v); const dm=s.match(/(TL|EUR|USD)/); const dov=dm?dm[1]:null;
  const n=numParse(s.replace(/\s+/g,''));
  return {fiyat:(n!=null&&n>0)?n:null, doviz:dov};
}
function parseBaumit(wb){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
  const urunler=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]||[]; const kod=r[0];
    if(kod==null||String(kod).trim()===''||/ürün\s*kodu/i.test(String(kod))) continue;
    const ad=r[2]; if(ad==null||String(ad).trim()==='') continue;
    const f={}; let dov=null;
    BAUMIT_LOC.forEach(([key,ci])=>{ const pc=parseBaumitCell(r[ci]); f[key]={fiyat:pc.fiyat}; if(pc.doviz&&dov==null) dov=pc.doviz; });
    const doviz=(dov==null||dov==='TL')?null:dov;
    urunler.push({kod:String(kod).trim(),ad:String(ad).replace(/\s+/g,' ').trim(),
      birim:r[7]!=null?String(r[7]).trim():'',doviz,f});
  }
  return [{ad:'Tüm Ürünler',urunler}];
}
function parseKnaufWB(wb){
  let rows=null;
  for(const name of wb.SheetNames){
    const r=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,raw:true,defval:null});
    if(r.some(x=>x&&x.some(c=>c&&/ÜR[Üu]N\s*KODU|^KODU$/i.test(String(c))))){ rows=r; break; }
  }
  if(!rows) rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
  return parseKnauf(rows);
}
function parseKnauf(rows){
  const isNum=v=>{ if(v==null||v==='')return false; return !isNaN(parseFloat(String(v).replace(',','.').replace(/\s/g,''))); };
  const cl=v=> v==null?null:String(v).trim()||null;
  const nv=numParse;
  const dov=b=>{ if(!b)return null; const x=String(b).toUpperCase(); return x.startsWith('EUR')?'EUR':x.startsWith('USD')?'USD':null; };
  let hi=rows.findIndex(r=>r&&r.some(c=>c&&/ÜR[Üu]N\s*KODU|^KODU$/i.test(String(c))));
  const cats=[]; let cur=null;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const a=cl(r[0]), b=cl(r[1]);
    if(a && !b && !isNum(r[0])){ cur={ad:a,urunler:[]}; cats.push(cur); continue; }
    if((a||b) && cur){
      const birim=cl(r[2]);
      cur.urunler.push({kod:a||'',ad:b||'',birim:birim||'',doviz:dov(birim),agirlik:cl(r[5]),paket:cl(r[6]),f:{izmit:nv(r[3]),ahiboz:nv(r[4])}});
    }
  }
  return cats.filter(c=>c.urunler.length);
}

/* Yücel matris formatı (ebat × et kalınlığı). USD tablolarını kullanır. */
const THK_SET=new Set([0.6,0.7,0.8,0.9,1.0,1.1,1.2,1.3,1.4,1.5,1.9,2.0,2.4,2.5,2.9,3.0,3.2,3.6,4.0,5.0,6.0,6.3,8.0,10.0]);
function thkLabel(v){
  if(v==null||v==='') return null;
  if(typeof v==='number') return THK_SET.has(Math.round(v*100)/100)?String(v):null;
  const s=String(v).trim();
  if(/[A-Za-zÇĞİÖŞÜçğıöşü×x]/.test(s)) return null;
  const nums=s.replace(/,/g,'.').split(/\s+/).map(parseFloat).filter(n=>!isNaN(n));
  if(nums.length && nums.every(n=>THK_SET.has(Math.round(n*100)/100))) return s.replace(/,/g,'.').replace(/\s+/g,' ').trim();
  return null;
}

function sheetCurrency(rows){

function parseSheetMatrix(rows){
  const hrows=[]; rows.forEach((r,i)=>{ if((r||[]).filter(v=>thkLabel(v)!=null).length>=3) hrows.push(i); });
  if(!hrows.length) return null;
  const urunler=[];
  for(let hi=0;hi<hrows.length;hi++){
    const h=hrows[hi], end=hi+1<hrows.length?hrows[hi+1]:rows.length;
    const hdr=rows[h]; const tcols=[];
    hdr.forEach((v,ci)=>{ const t=thkLabel(v); if(t!=null) tcols.push([ci,t]); });
    const firstT=tcols[0][0]; const sizeCols=[]; for(let ci=0;ci<firstT;ci++) sizeCols.push(ci);
    for(let ri=h+1;ri<end;ri++){
      const r=rows[ri]||[];
      let sizes=sizeCols.map(sc=>r[sc]).filter(v=>v!=null&&v!=='').map(v=>String(v).trim()).filter(s=>!noteish(s));
      if(!sizes.length) continue;
      const ab=sizes.join(' / ');
      tcols.forEach(([ci,tl])=>{ const p=numParse(r[ci]); if(p!=null) urunler.push({kod:'',ad:`${ab} — ${tl} mm`,f:{fiyat:p}}); });
    }
  }
  if(!urunler.length) return null;
  let title=null;
  for(let i=0;i<Math.min(rows.length,6)&&!title;i++){ (rows[i]||[]).forEach(v=>{ if(v&&/(HR|CR)\s*(PROF|BORU)/i.test(String(v))) title=String(v); }); }
  return {urunler,title};
}
function numParse(v){ if(v==null||v==='')return null; if(typeof v==='number')return isNaN(v)?null:Math.round(v*1e4)/1e4;
  let s=String(v).trim().replace(/[^\d.,-]/g,''); if(s==='')return null;
  if(s.includes('.')&&s.includes(',')){ s=(s.lastIndexOf(',')>s.lastIndexOf('.'))?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,''); }
  else if(s.includes(',')){ s=s.replace(',','.'); }
  const n=parseFloat(s); return isNaN(n)?null:Math.round(n*1e4)/1e4; }
function guessDate(name){ const m=String(name).match(/(\d{1,2})[._-](\d{1,2})[._-](\d{4})/); return m?`${m[1]}.${m[2]}.${m[3]}`:null; }

/* ODS okuyucu */
async function odsToRows(buf){
  const xml=await unzipContentXml(new Uint8Array(buf));
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  const NS='urn:oasis:names:tc:opendocument:xmlns:table:1.0';
  const OF='urn:oasis:names:tc:opendocument:xmlns:office:1.0';
  const table=doc.getElementsByTagNameNS(NS,'table')[0];
  if(!table) throw new Error('ODS tablo bulunamadı');
  const rowEls=table.getElementsByTagNameNS(NS,'table-row'); const rows=[]; const MAXC=14;
  for(let i=0;i<rowEls.length;i++){
    const rr=parseInt(rowEls[i].getAttributeNS(NS,'number-rows-repeated')||'1',10)||1;
    const cellEls=rowEls[i].childNodes; const cells=[];
    for(let j=0;j<cellEls.length;j++){
      const cell=cellEls[j]; if(cell.nodeType!==1) continue;
      const ln=cell.localName; if(ln!=='table-cell'&&ln!=='covered-table-cell') continue;
      const rep=Math.min(parseInt(cell.getAttributeNS(NS,'number-columns-repeated')||'1',10)||1,200);
      const vt=cell.getAttributeNS(OF,'value-type'), oval=cell.getAttributeNS(OF,'value');
      let val=null;
      if(vt==='float'||vt==='percentage'||vt==='currency') val=(oval!=null?oval:(cell.textContent||'').trim());
      else if(vt==='error') val=null;
      else { const t=(cell.textContent||'').trim(); val=t||null; }
      for(let k=0;k<rep;k++){ if(cells.length>=MAXC)break; cells.push(val); }
      if(cells.length>=MAXC) break;
    }
    const empty=cells.every(c=>c==null||c==='');
    for(let r=0;r<(empty?1:rr);r++) rows.push(cells.slice());
  }
  return rows;
}
async function unzipContentXml(bytes){
  const dv=new DataView(bytes.buffer,bytes.byteOffset,bytes.byteLength);
  let eocd=-1; for(let i=bytes.length-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;} }
  if(eocd<0) throw new Error('Geçersiz ODS');
  const cdCount=dv.getUint16(eocd+10,true); let off=dv.getUint32(eocd+16,true); const td=new TextDecoder();
  for(let n=0;n<cdCount;n++){
    if(dv.getUint32(off,true)!==0x02014b50) break;
    const method=dv.getUint16(off+10,true), compSize=dv.getUint32(off+20,true);
    const nameLen=dv.getUint16(off+28,true), extraLen=dv.getUint16(off+30,true), commLen=dv.getUint16(off+32,true);
    const lho=dv.getUint32(off+42,true);
    const name=td.decode(bytes.subarray(off+46,off+46+nameLen));
    if(name==='content.xml'){
      const lnameLen=dv.getUint16(lho+26,true), lextraLen=dv.getUint16(lho+28,true);
      const start=lho+30+lnameLen+lextraLen; const comp=bytes.subarray(start,start+compSize);
      if(method===0) return td.decode(comp);
      const ds=new DecompressionStream('deflate-raw');
      const out=await new Response(new Blob([comp]).stream().pipeThrough(ds)).arrayBuffer();
      return new TextDecoder().decode(out);
    }
    off+=46+nameLen+extraLen+commLen;
  }
  throw new Error('content.xml bulunamadı');
}

function splitCSV(text){
  text=text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n');
  const nl=text.indexOf('\n'); const first=nl>=0?text.slice(0,nl):text;
  const delim=(first.split(';').length>=first.split(',').length)?';':',';
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else if(ch==='"') q=true;
    else if(ch===delim){ row.push(cur); cur=''; }
    else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else cur+=ch;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function parseUniversalRows(rows,b){
  rows=(rows||[]).filter(r=>r&&r.some(c=>String(c==null?'':c).trim()!==''));
  if(rows.length<2) return null;
  const head=rows[0].map(h=>String(h==null?'':h).trim());
  const low=head.map(h=>h.toLocaleLowerCase('tr'));
  const find=names=>low.findIndex(h=>names.includes(h));
  const ci={kat:find(['kategori']),kod:find(['kod','ürün kodu']),ad:find(['ürün','ürün adı','urun']),birim:find(['birim']),dov:find(['döviz','doviz','para birimi'])};
  if(ci.ad<0) return null;
  const pcs=priceCols(b);
  const pmap=pcs.map(pc=>({pc,idx:head.findIndex(h=>h===pc.head)})).filter(x=>x.idx>=0);
  if(!pmap.length){ const fi=find(['fiyat']); if(fi>=0&&pcs.length) pmap.push({pc:pcs[0],idx:fi}); }
  if(!pmap.length) return null;
  const num=v=>{ const n=numParse(String(v)); return (n!=null&&n>0)?n:null; };
  const cats=[]; const idx={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const ad=String(r[ci.ad]||'').trim(); if(!ad) continue;
    const katAd=(ci.kat>=0&&String(r[ci.kat]||'').trim())||'Tüm Ürünler';
    const dov=ci.dov>=0?String(r[ci.dov]||'').trim().toUpperCase():'';
    const doviz=(dov===''||dov==='TL')?null:dov;
    const f={};
    pmap.forEach(({pc,idx:pi})=>{ const v=num(r[pi]); if(pc.sel){ f[pc.sel]=f[pc.sel]||{}; f[pc.sel][pc.col]=v; } else f[pc.col]=v; });
    if(!(katAd in idx)){ idx[katAd]=cats.length; cats.push({ad:katAd,urunler:[]}); }
    cats[idx[katAd]].urunler.push({kod:ci.kod>=0?String(r[ci.kod]||'').trim():'',ad,birim:ci.birim>=0?String(r[ci.birim]||'').trim():'',doviz,f});
  }
  return cats.length?cats:null;
}

  }catch(e){}

    try{
      const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(),8000);
      const res=await fetch(px(SRC),{cache:'no-store',signal:ctl.signal});
      clearTimeout(to);
      if(!res.ok) continue;
      const txt=await res.text();
      const doc=new DOMParser().parseFromString(txt,'text/xml');
      if(doc.querySelector('parsererror')) continue;
      const get=kod=>{
        const cur=[...doc.querySelectorAll('Currency')].find(c=>c.getAttribute('Kod')===kod);
        if(!cur) return null;
        const el=cur.querySelector('BanknoteSelling');
        const raw=el&&el.textContent.trim().replace(',','.');
        const v=raw?parseFloat(raw):NaN;
        return isFinite(v)&&v>0?v:null;
      };
      const usd=get('USD'), eur=get('EUR');
      if(sane(usd)&&sane(eur)){ const td=doc.querySelector('Tarih_Date'); return {usd,eur,tarih:td?td.getAttribute('Tarih'):''}; }
    }catch(e){ /* sıradaki kaynağı dene */ }
  }
  return null;
}
async function tcmbGuncelle(){
  const btn=document.getElementById('kurGuncelle'); if(btn.disabled) return;
  btn.disabled=true; btn.classList.add('loading');
  const r=await fetchTCMB();
  btn.disabled=false; btn.classList.remove('loading');
  if(!r){ toast('TCMB kuru alınamadı — bağlantı/erişim engeli olabilir. Kuru elle de girebilirsiniz.',true); return; }
  store.kurlar.USD=r.usd; store.kurlar.EUR=r.eur; save(); syncKur(); render();
  toast('TCMB Efektif Satış güncellendi'+(r.tarih?(' · '+r.tarih):'')+' (USD '+r.usd+' · EUR '+r.eur+')');
}
document.getElementById('kurGuncelle').onclick=tcmbGuncelle;

/* ---- misc ---- */
function toast(msg,err){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',err?3400:1900); }
function openSide(){ document.getElementById('side').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeSide(){ document.getElementById('side').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }
document.getElementById('search').addEventListener('input',e=>{ query=e.target.value; if(active.type==='liste') renderListeRows(); else if(active.type==='kategori'){ const cat=findCat(active.marka,active.cat); if(cat) renderKatRows(cat,getIsk(active.marka,active.cat),brand(active.marka).kolonlar,active.marka); } });
document.getElementById('fileInput').addEventListener('change',e=>{ if(e.target.files[0]) handleFile(e.target.files[0],uploadMarka); e.target.value=''; uploadMarka=null; });
document.getElementById('exportAll').onclick=exportAll;
document.getElementById('resetParams').onclick=()=>{ if(!confirm('Tüm markalardaki iskonto/kâr ayarları sıfırlanacak. Emin misiniz?'))return; store.isk={}; save(); render(); toast('İskontolar sıfırlandı'); };
document.getElementById('menuBtn').onclick=openSide;
document.getElementById('scrim').onclick=closeSide;

/* Eski ondalık-birleşme hatasından kalmış kuru düzelt (örn. 531848 -> 53,1848) */
function fixKur(){ ['EUR','USD'].forEach(c=>{ let v=store.kurlar[c]; if(Number.isInteger(v)&&v>=10000){ store.kurlar[c]=v/10000; } }); save(); }
fixKur();
syncKur(); renderNav(); render();
</script>
